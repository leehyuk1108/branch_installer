<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>설치 링크 변환기</title>
    <meta name="description" content="브랜치 링크를 설치 링크로 변환합니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">설치 링크</p>
        <h1>설치 링크 변환기</h1>
        <p class="hero-copy">GitHub 브랜치 링크를 넣으면 comma 기기에서 바로 쓸 수 있는 설치 링크로 바꿉니다.</p>
      </header>

      <main class="stack">
        <section class="panel converter-panel">
          <div class="panel-heading">
            <p class="panel-kicker">변환</p>
            <h2>브랜치 링크</h2>
          </div>
          <form id="converter-form" class="converter-form">
            <label class="sr-only" for="branch-input">브랜치 링크</label>
            <div class="converter-controls">
              <input
                id="branch-input"
                class="converter-input"
                type="text"
                name="branch-input"
                placeholder="GitHub 브랜치 링크"
                autocomplete="off"
                spellcheck="false"
              >
              <button type="submit" class="action-button action-primary">변환</button>
            </div>
          </form>
          <div id="converter-result" class="converter-result">
            <p class="empty-state">링크를 넣어주세요.</p>
          </div>
        </section>

        <section class="panel branch-panel">
          <div class="panel-heading">
            <p class="panel-kicker">자주 쓰는 브랜치</p>
            <h2>바로 열기</h2>
          </div>
          <div id="featured-groups" class="featured-groups">
            <p class="empty-state">불러오는 중...</p>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
