<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hyukskol</title>
    <meta name="description" content="브랜치 URL을 설치 링크로 변환합니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <h1>hyukskol</h1>
        <p class="hero-copy">브랜치 Github URL을 넣으면 comma 기기에서 설치 가능한 설치 URL로 변환됩니다.</p>
      </header>

      <main class="stack">
        <section class="panel converter-panel">
          <div class="panel-heading">
            <p class="panel-kicker">변환</p>
            <h2>브랜치 URL</h2>
          </div>
          <form id="converter-form" class="converter-form">
            <label class="sr-only" for="branch-input">브랜치 URL</label>
            <div class="converter-controls">
              <input
                id="branch-input"
                class="converter-input"
                type="text"
                name="branch-input"
                placeholder="브랜치 Github URL"
                autocomplete="off"
                spellcheck="false"
              >
              <button type="submit" class="action-button action-primary">변환</button>
            </div>
          </form>
          <div id="converter-result" class="converter-result"></div>
        </section>

        <section class="panel branch-panel">
          <div class="panel-heading branch-panel-heading">
            <h2 class="branch-panel-title">많이 쓰이는 포크 리스트</h2>
            <p class="branch-panel-copy">미리 제작되어 있는 주로 쓰이는 포크 설치 URL입니다.</p>
          </div>
          <div id="featured-groups" class="featured-groups">
            <p class="empty-state">불러오는 중...</p>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
